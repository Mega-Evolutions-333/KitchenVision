name: Kitchen Vision CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        # This installs Streamlit, Pillow, python-dotenv, openai, etc. 

      - name: Check Python Syntax
        run: |
          python -m py_compile app.py
          python -m py_compile config.py
        env:
          # Using mock mode so it doesn't try to look for real API keys during CI 
          KV_PROVIDER: mock 

  docker-build:
    runs-on: ubuntu-latest
    needs: python-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        # This uses your included Dockerfile to ensure the container builds successfully 
        run: docker build -t kitchen-vision .
